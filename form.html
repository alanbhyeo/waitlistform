<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Person Details Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="form-container">
        <div class="form-wrapper">
            <h1>Person Details Form</h1>
            <p class="subtitle">Please fill in your information below</p>
            
            <form id="personDetailsForm" novalidate>
                <div class="form-group">
                    <label for="firstName">First Name <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="firstName" 
                        name="firstName" 
                        required 
                        maxlength="100"
                        placeholder="Enter your first name"
                    >
                    <span class="error-message" id="firstNameError"></span>
                </div>

                <div class="form-group">
                    <label for="lastName">Last Name <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="lastName" 
                        name="lastName" 
                        required 
                        maxlength="100"
                        placeholder="Enter your last name"
                    >
                    <span class="error-message" id="lastNameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required 
                        maxlength="255"
                        placeholder="your.email@example.com"
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="phone">Mobile <span class="required">*</span></label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        required 
                        placeholder="04XX XXX XXX"
                        pattern="^04\d{2}\s\d{3}\s\d{3}$"
                        maxlength="12"
                    >
                    <span class="error-message" id="phoneError"></span>
                </div>

                <div class="form-group">
                    <label for="dateOfBirth">Date of Birth</label>
                    <input 
                        type="date" 
                        id="dateOfBirth" 
                        name="dateOfBirth"
                    >
                    <span class="error-message" id="dateOfBirthError"></span>
                </div>

                <div class="form-group">
                    <label for="streetAddress">Street Address</label>
                    <input 
                        type="text" 
                        id="streetAddress" 
                        name="streetAddress" 
                        maxlength="500"
                        placeholder="123 Main Street"
                    >
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">City</label>
                        <input 
                            type="text" 
                            id="city" 
                            name="city" 
                            maxlength="100"
                            placeholder="City"
                        >
                    </div>

                    <div class="form-group">
                        <label for="state">State</label>
                        <select 
                            id="state" 
                            name="state"
                        >
                            <option value="">Select State</option>
                            <option value="NSW">NSW</option>
                            <option value="VIC">VIC</option>
                            <option value="QLD">QLD</option>
                            <option value="ACT">ACT</option>
                            <option value="NT">NT</option>
                            <option value="WA">WA</option>
                            <option value="TAS">TAS</option>
                            <option value="SA">SA</option>
                        </select>
                        <span class="error-message" id="stateError"></span>
                    </div>

                    <div class="form-group">
                        <label for="zipCode">Postcode</label>
                        <input 
                            type="text" 
                            id="zipCode" 
                            name="zipCode" 
                            maxlength="10"
                            placeholder="1234"
                        >
                        <span class="error-message" id="zipCodeError"></span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="submit-button" id="submitButton">
                        <span class="button-text">Submit</span>
                        <span class="button-loader" id="buttonLoader" style="display: none;">⏳</span>
                    </button>
                    <button type="reset" class="reset-button">Clear Form</button>
                </div>

                <div id="formMessage" class="form-message" style="display: none;"></div>
            </form>
        </div>
    </div>

    <!-- Supabase JS Library (SRI for integrity; update integrity when changing version) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js" integrity="sha384-+exuGmToMCgcfiTDu+P+1aCmlH2Mis7lstkjVmVHdwvJqtNNqhxMreqsIe6bVstn" crossorigin="anonymous"></script>
    
    <!-- Supabase Configuration -->
    <script src="supabase-config.js"></script>
    
    <!-- Form Handler (includes phone formatting) -->
    <script src="form-handler.js"></script>
</body>
</html>
